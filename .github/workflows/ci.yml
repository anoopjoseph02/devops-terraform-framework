name: Terraform CI

on:
  workflow_run:
    workflows: ["AI Terraform Generator"]
    types:
      - completed

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: ai-terraform-pr

    - uses: azure/login@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init
      working-directory: terraform/

    - name: Auto Format Terraform
      run: terraform fmt -recursive
      working-directory: terraform/

    - name: Commit Formatting Fix
      env:
        BRANCH: ${{ github.head_ref || github.ref_name }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        #git rm -r --cached terraform/.terraform
        #git rm --cached terraform/.terraform.lock.hcl
        echo ".terraform/" >> .gitignore
        echo ".terraform.lock.hcl" >> .gitignore
        #git checkout $BRANCH
        git add .
        git commit -m "Auto-format Terraform" || echo "No changes"
        git push

    - name: Format Check
      run: terraform fmt -check
      working-directory: terraform/

    - name: Validate
      run: terraform validate
      working-directory: terraform/

    - name: Security scan — Checkov (hard gate)
      run: |
        pip install checkov --break-system-packages
        checkov -d terraform/ \
          --soft-fail-on MEDIUM \
          --hard-fail-on HIGH,CRITICAL \
          --output cli \
          --output json \
          --output-file-path reports/
        # Summarise for evaluation report
        python3 - <<'EOF'
        import json, pathlib, glob
        files = glob.glob("reports/results_*.json")
        if files:
            data = json.loads(pathlib.Path(files[0]).read_text())
            summary = {
                "passed_checks": data.get("summary", {}).get("passed", 0),
                "failed_checks":  data.get("summary", {}).get("failed", 0),
                "num_runs": 1,
            }
            pathlib.Path("reports/checkov_summary.json").write_text(
                json.dumps(summary, indent=2))
            print(summary)
        EOF

    - name: Cost estimation — Infracost (gate at $500/month)
      continue-on-error: true
      run: |
        curl -sL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
        infracost breakdown --path terraform/ --format json > reports/infracost.json
        python3 - <<'EOF'
        import json, sys
        data = json.loads(open("reports/infracost.json").read())
        cost = float(data.get("totalMonthlyCost", 0))
        print(f"Estimated monthly cost: ${cost:.2f}")
        if cost > 500:
            print("COST GATE: exceeds $500/month threshold")
            sys.exit(1)
        EOF
  
    - name: Terraform Plan (with retry)
      run: |
        terraform plan -no-color
      working-directory: terraform/

    - name: Run TerraTest
      run: |
        if [ -d "tests" ]; then
        cd tests && go test -v
        else
        echo "Skipping TerraTest (no tests folder)"
        fi
