name: Terraform CI

on:
  workflow_run:
    workflows: ["AI Terraform Generator"]
    types:
      - completed

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        ref: ai-terraform-pr

    - uses: azure/login@v3
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init
      working-directory: terraform/

    - name: Auto Format Terraform
      run: terraform fmt -recursive
      working-directory: terraform/

    - name: Commit Formatting Fix
      env:
        BRANCH: ${{ github.head_ref || github.ref_name }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        #git rm -r --cached terraform/.terraform
        #git rm --cached terraform/.terraform.lock.hcl
        echo ".terraform/" >> .gitignore
        echo ".terraform.lock.hcl" >> .gitignore
        #git checkout $BRANCH
        git add .
        git commit -m "Auto-format Terraform" || echo "No changes"
        git push

    - name: Format Check
      run: terraform fmt -check
      working-directory: terraform/

    - name: Validate
      run: terraform validate
      working-directory: terraform/

    - name: Security Scan (Checkov)
      continue-on-error: true
      run: |
        pip install checkov
        checkov -d terraform/

    - name: Cost Estimation (Infracost)
      continue-on-error: true
      env:
        INFRACOST_API_KEY: ${{ vars.INFRACOST_API_KEY }}
      run: |
        curl -sL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
        infracost breakdown --path terraform/
  
    - name: Terraform Plan (with retry)
      run: |
        terraform plan -no-color
      working-directory: terraform/


    - name: Run TerraTest
      run: |
        if [ -d "tests" ]; then
        cd tests

        # Initialize module if missing
        [ -f go.mod ] || go mod init terratest

        # FIX: download + verify deps
        go mod tidy
        go mod download

        # Run tests
        go test -v -timeout 30m
        else
        echo "Skipping TerraTest (no tests folder)"
        fi
