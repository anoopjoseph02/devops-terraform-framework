name: AI Terraform Generator (Intelligent)

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Install tools
      run: sudo apt-get update && sudo apt-get install -y jq bc

    # 🔷 STEP 1: Read Input
    - name: Read JSON Input
      run: |
        INPUT=$(cat input/infra.json)
        echo "INPUT<<EOF" >> $GITHUB_ENV
        echo "$INPUT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # 🔷 STEP 2: Intelligent Recommendation
    - name: Intelligent Recommendation
      run: |
        UPDATED_INPUT=$(echo "$INPUT" | jq '
          if .traffic == "high" then . + {autoscaling: true, node_count: 3}
          elif .cost == "low" then . + {vm_size: "Standard_B1s"}
          else .
          end
        ')

        echo "UPDATED_INPUT<<EOF" >> $GITHUB_ENV
        echo "$UPDATED_INPUT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # 🔷 STEP 3: Build Prompt
    - name: Build Prompt
      run: |
        PROMPT=$(printf "Generate production-ready Azure Terraform code.
        RULES:
        - Only use resources from input
        - No extra assumptions
        - Use azurerm provider
        - Output ONLY Terraform with separators:
        ---main.tf---
        ---variables.tf---
        ---outputs.tf---
        ---terraform.tfvars---
        INPUT JSON: %s" "$UPDATED_INPUT")

        echo "PROMPT<<EOF" >> $GITHUB_ENV
        echo "$PROMPT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # 🔷 STEP 4: Call OpenAI
    - name: Generate Terraform via AI
      run: |
        jq -n --arg prompt "$PROMPT" '{
          model: "gpt-4o",
          messages: [
            {role: "system", content: "You are a Terraform expert."},
            {role: "user", content: $prompt}
          ]
        }' > payload.json

        curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @payload.json > response.json

        jq -r '.choices[0].message.content' response.json > terraform_output.txt
        sed -i 's/```hcl//g; s/```//g' terraform_output.txt

    # 🔷 STEP 5: Split Files
    - name: Split Terraform Files
      run: |
        mkdir -p terraform
        awk '/---main.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/main.tf
        awk '/---variables.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/variables.tf
        awk '/---outputs.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/outputs.tf
        awk '/---terraform.tfvars---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/terraform.tfvars

    # 🔷 STEP 6: Auto Optimization
    - name: Optimize Terraform
      run: |
        echo "[INFO] Optimizing resources..."

        # Example optimization rules
        sed -i 's/Standard_DS3_v2/Standard_DS2_v2/g' terraform/main.tf || true

    # 🔷 STEP 7: Format & Validate
    - name: Format Terraform
      run: terraform fmt -recursive
      working-directory: terraform/

    - name: Validate Terraform
      run: terraform validate
      working-directory: terraform/

    # 🔷 STEP 8: Anomaly Detection
    - name: Terraform Plan + Anomaly Detection
      run: |
        terraform init
        terraform plan -out=tfplan
        terraform show -json tfplan > plan.json

        CHANGES=$(jq '.resource_changes | length' plan.json)

        if [ "$CHANGES" -gt 10 ]; then
          echo "[ALERT] Too many infra changes detected!"
          exit 1
        fi
      working-directory: terraform/

    # 🔷 STEP 11: Monitoring Simulation
    - name: Collect Metrics
      run: |
        CPU=$((RANDOM % 100))
        echo "CPU=$CPU" > metrics.txt
        cat metrics.txt

    # 🔷 STEP 12: Predictive Scaling
    - name: Predictive Scaling
      run: |
        HOUR=$(date +%H)
        if [ "$HOUR" -ge 18 ] && [ "$HOUR" -le 22 ]; then
          echo "[INFO] Peak detected → scaling up"
          sed -i 's/node_count = 2/node_count = 4/g' terraform/main.tf || true
        fi

    # 🔷 STEP 13: Auto Remediation
    - name: Auto Remediation
      run: |
        CPU=$(cut -d'=' -f2 metrics.txt)

        if [ "$CPU" -gt 80 ]; then
          echo "[ALERT] High CPU → scaling up"
          sed -i 's/node_count = 2/node_count = 5/g' terraform/main.tf || true
        fi

    # 🔷 STEP 14: Create PR
    - name: Commit & PR
      env:
        TOKEN: ${{ secrets.TOKEN }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        BRANCH="ai-terraform-pr"
        git checkout -b $BRANCH

        git add terraform/
        git commit -m "AI + Optimized Terraform with intelligent scaling"

        git push origin HEAD:$BRANCH --force
