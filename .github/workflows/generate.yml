name: AI Terraform Generator

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - uses: hashicorp/setup-terraform@v2

    - name: Install tools
      run: sudo apt-get install -y jq

    - name: Read JSON Input
      run: |
        INPUT=$(cat input/infra.json)
        echo "INPUT<<EOF" >> $GITHUB_ENV
        echo "$INPUT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Build Prompt
      run: |
        #PROMPT=$(printf "You are a senior DevOps engineer and Terraform expert specializing in Microsoft Azure. Your task is to convert the provided infrastructure definition into production-ready Terraform code. REQUIREMENTS: - Use ONLY Azure (azurerm provider) - Dynamically detect resources from input (DO NOT assume fixed resources) - Generate only the resources present in the input JSON - Use correct azurerm_* resource types - Use variables (no hardcoding) - Follow Terraform best practices - Ensure proper dependencies between resources STRUCTURE: - Use modular design where applicable - Generate: main.tf variables.tf outputs.tf terraform.tfvars RULES: - DO NOT include markdown or formatting - DO NOT include explanations - ONLY return plain Terraform code - Use EXACT separators: ---main.tf--- ---variables.tf--- ---outputs.tf--- ---terraform.tfvars--- INPUT JSON: %s" "$INPUT")
        PROMPT=$(printf "You are a senior DevOps engineer and Terraform expert specializing in Microsoft Azure. Your task is to convert the provided infrastructure definition into production-ready Terraform code. REQUIREMENTS: - Use ONLY Azure (azurerm provider) - Dynamically detect resources from input (DO NOT assume fixed resources) - Generate only the resources present in the input JSON - Use correct azurerm_* resource types - Use variables (no hardcoding) - Follow Terraform best practices - Ensure proper dependencies between resources STRUCTURE: - Generate: main.tf variables.tf outputs.tf terraform.tfvars CRITICAL RULES: - You MUST ONLY generate resources explicitly present in INPUT JSON - You MUST NOT generate any additional resources, blocks, or attributes - If something is not present in input -> DO NOT generate it - Output MUST be a direct 1:1 mapping of input -> Terraform - If unsure -> OMIT (do not guess) RULES: - ONLY modify required resources - DO NOT overwrite entire file - Preserve existing resource names, structure, and formatting - Avoid duplicate resources - Maintain consistent attribute ordering inside resources - Use stable naming conventions derived ONLY from input - Do not introduce timestamps, hashes, or random suffixes - DO NOT introduce optional attributes unless explicitly required by input - DO NOT add depends_on if implicit dependency already exists - Ensure identical output for identical input STRICT OUTPUT RULES: - DO NOT include markdown or formatting - DO NOT include explanations - ONLY return plain Terraform code - Use EXACT separators with no spaces: ---main.tf--- ---variables.tf--- ---outputs.tf--- ---terraform.tfvars--- OUTPUT FORMAT (STRICT): ---main.tf--- <code> ---variables.tf--- <code> ---outputs.tf--- <code> ---terraform.tfvars--- <code> INPUT JSON: %s" "$INPUT")
        echo "PROMPT<<EOF" >> $GITHUB_ENV
        echo "$PROMPT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Call OpenAI API
      run: |
        jq -n \
          --arg prompt "$PROMPT" \
          '{
            model: "gpt-4o",
            messages: [
              {role: "system", content: "You are a Terraform expert."},
              {role: "user", content: $prompt}
            ]
          }' > payload.json
        JSON=$(jq -c . payload.json)

        curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$JSON" > response.json

        cat response.json | jq -r '.choices[0].message.content' > terraform_output.txt
        cat terraform_output.txt

    - name: Split Terraform Files
      run: |
        mkdir -p terraform/modules
        awk '/---main.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/main.tf
        awk '/---variables.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/variables.tf
        awk '/---outputs.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/outputs.tf
        awk '/---terraform.tfvars---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/terraform.tfvars
        sed -i '/depends_on/d' terraform/main.tf

    - name: Format Terraform
      run: terraform fmt -recursive
      working-directory: terraform/

    - name: Create Branch & PR
      env:
        TOKEN: ${{ secrets.TOKEN }}
        REPO: ${{ github.repository }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        BRANCH="ai-terraform-$(date +%s)"
        git checkout -b $BRANCH

        git add terraform/
        git commit -m "AI Generated Terraform"
        git push origin $BRANCH
    #     curl -X POST https://api.github.com/repos/$REPO/pulls -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github.v3+json" -d "{\"title\":\"AI Terraform\",\"head\":\"$BRANCH\",\"base\":\"master\",\"body\":\"Auto-generated Terraform code\"}"
        
