name: AI Terraform Intelligent Pipeline

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ai-terraform:
    runs-on: ubuntu-latest

    steps:
    # 🔷 Checkout
    - uses: actions/checkout@v3

    # 🔷 Setup Terraform
    - uses: hashicorp/setup-terraform@v2

    # 🔷 Install dependencies
    - name: Install Tools
      run: sudo apt-get update && sudo apt-get install -y jq bc

    # 🔷 STEP 1: Read Input
    - name: Read Input JSON
      run: |
        INPUT=$(cat input/infra.json)
        echo "INPUT<<EOF" >> $GITHUB_ENV
        echo "$INPUT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # 🔷 STEP 2: AI Recommendation Engine
    - name: AI Recommendation
      run: |
        PROMPT=$(printf "Enhance this infrastructure JSON with best practices:
        - autoscaling
        - cost optimization
        - performance tuning
        Return ONLY JSON.

        INPUT: %s" "$INPUT")

        jq -n --arg prompt "$PROMPT" '{
          model: "gpt-4o-mini",
          messages: [
            {role: "system", content: "Return ONLY JSON"},
            {role: "user", content: $prompt}
          ]
        }' > payload.json

        curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @payload.json > response.json

        UPDATED=$(jq -r '.choices[0].message.content' response.json)

        echo "$UPDATED" > enhanced.json

    # 🔷 STEP 3: Build Prompt for Terraform
    - name: Build Terraform Prompt
      run: |
        INPUT=$(cat enhanced.json)

        PROMPT=$(printf "Generate Azure Terraform code.
        RULES:
        - Only use resources from input
        - No assumptions
        - Output ONLY Terraform
        ---main.tf---
        ---variables.tf---
        ---outputs.tf---
        ---terraform.tfvars---

        INPUT JSON: %s" "$INPUT")

        echo "PROMPT<<EOF" >> $GITHUB_ENV
        echo "$PROMPT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # 🔷 STEP 4: AI Terraform Generation
    - name: Generate Terraform
      run: |
        jq -n --arg prompt "$PROMPT" '{
          model: "gpt-4o",
          messages: [
            {role: "system", content: "Terraform expert"},
            {role: "user", content: $prompt}
          ]
        }' > payload.json

        curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @payload.json > response.json

        jq -r '.choices[0].message.content' response.json > terraform_output.txt
        sed -i 's/```//g' terraform_output.txt

    # 🔷 STEP 5: Split Terraform Files
    - name: Split Files
      run: |
        mkdir -p terraform
        awk '/---main.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/main.tf
        awk '/---variables.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/variables.tf
        awk '/---outputs.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/outputs.tf
        awk '/---terraform.tfvars---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/terraform.tfvars

    # 🔷 STEP 6: AI Optimization
    - name: AI Optimization
      run: |
        TF=$(cat terraform/main.tf)

        PROMPT=$(printf "Optimize this Terraform for cost and performance.
        Keep structure same.

        %s" "$TF")

        jq -n --arg prompt "$PROMPT" '{
          model: "gpt-4o-mini",
          messages: [
            {role: "system", content: "Return only Terraform"},
            {role: "user", content: $prompt}
          ]
        }' > payload.json

        curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @payload.json > opt.json

        jq -r '.choices[0].message.content' opt.json > terraform/main.tf

    # 🔷 STEP 7: Format & Validate
    - run: terraform fmt -recursive
      working-directory: terraform/


    # 🔷 STEP 8: Plan + Anomaly Detection
    - name: Plan & Detect Anomalies
      run: |
        terraform plan -out=tfplan
        terraform show -json tfplan > plan.json

        COUNT=$(jq '.resource_changes | length' plan.json)

        if [ "$COUNT" -gt 10 ]; then
          echo "Too many changes detected!"
          exit 1
        fi
      working-directory: terraform/

    # 🔷 STEP 9: TerraTest
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run TerraTest
      run: |
        cd tests
        go mod init terratest || true
        go get github.com/gruntwork-io/terratest/modules/terraform
        go test -v -timeout 30m

    # 🔷 STEP 11: Monitoring
    - name: Collect Metrics
      run: |
        CPU=$((RANDOM % 100))
        echo "CPU=$CPU" > metrics.txt

    # 🔷 STEP 12: Predictive Scaling (AI)
    - name: AI Predictive Scaling
      run: |
        CPU=$(cut -d'=' -f2 metrics.txt)

        PROMPT=$(printf "CPU is %s%%. Suggest scaling decision." "$CPU")

        jq -n --arg prompt "$PROMPT" '{
          model: "gpt-4o-mini",
          messages: [
            {role: "system", content: "Return only action"},
            {role: "user", content: $prompt}
          ]
        }' > payload.json

        curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d @payload.json > pred.json

        ACTION=$(jq -r '.choices[0].message.content' pred.json)

        echo "ACTION=$ACTION"

    # 🔷 STEP 13: Auto Remediation
    - name: Auto Remediation
      run: |
        if [[ "$ACTION" == *"scale up"* ]]; then
          sed -i 's/node_count = 2/node_count = 4/g' terraform/main.tf || true
        fi

    # 🔷 STEP 14: Create PR
    - name: Commit & PR
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        BRANCH="ai-terraform-update"
        git checkout -b $BRANCH

        git add terraform/
        git commit -m "AI optimized & self-healed infrastructure"

        git push origin HEAD:$BRANCH --force
