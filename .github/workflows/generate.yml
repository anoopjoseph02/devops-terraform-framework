name: AI Terraform Generator

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install tools
      run: sudo apt-get install -y jq

    - name: Read Input
      run: |
        INPUT=$(cat input/infra.yaml | sed 's/"/\\"/g')
        #echo "INPUT=$INPUT" >> $GITHUB_ENV

    - name: Generate Terraform (Multi-file)
      run: |
        RESPONSE=$(curl -s https://test-openai-786.openai.azure.com/ \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"model\": \"gpt-5-nano",
            \"messages\": [
              {
                \"role\": \"system\",
                \"content\": \"You are a Terraform expert.\"
              },
              {
                \"role\": \"user\",
                \"content\": \"Generate Terraform files: main.tf, variables.tf, outputs.tf from YAML:\\n$INPUT\"
              }
            ]
          }")

        echo "Output of chatgpt"
        echo $RESPONSE

        OUTPUT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

        echo "$OUTPUT" > terraform/main.tf

    - name: Create Branch & PR
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        BRANCH="ai-terraform-$(date +%s)"
        git checkout -b $BRANCH

        git add terraform/
        git commit -m "AI Generated Terraform"

        git push origin $BRANCH

        gh pr create --title "AI Terraform" --body "Auto-generated"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
