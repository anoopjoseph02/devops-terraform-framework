name: AI Terraform Pipeline

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:

    # 🔹 Checkout PR branch
    - name: Checkout PR Branch
      uses: actions/checkout@v3
      with:
        ref: ${{ github.head_ref }}

    # 🔹 Configure Git
    - name: Configure Git
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

    # 🔹 Rebase with main
    - name: Rebase with main
      run: |
        git fetch origin main
        git rebase origin/main || (git rebase --abort && exit 1)

    # 🔹 Load input JSON
    - name: Load Input
      run: |
        INPUT=$(cat infra.json)
        echo "INPUT<<EOF" >> $GITHUB_ENV
        echo "$INPUT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    # 🔹 Generate Terraform using AI
    - name: Generate Terraform
      run: |
        PROMPT=$(printf "You are a senior DevOps engineer and Terraform expert specializing in Microsoft Azure. Your task is to convert the provided infrastructure definition into production-ready Terraform code. REQUIREMENTS: - Use ONLY Azure (azurerm provider) - Dynamically detect resources from input (DO NOT assume fixed resources) - Generate only the resources present in the input JSON - Use correct azurerm_* resource types - Use variables (no hardcoding) - Follow Terraform best practices - Ensure proper dependencies between resources - Ensure deterministic and identical output for identical input RULES: - ONLY modify required resources - DO NOT overwrite entire file - Preserve structure and formatting - Avoid duplicate resources - Maintain consistent attribute ordering - DO NOT add optional fields like depends_on unless required STRICT OUTPUT: ---main.tf--- ---variables.tf--- ---outputs.tf--- ---terraform.tfvars--- INPUT: %s" "$INPUT")

        curl -s https://api.openai.com/v1/responses \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "{\"model\":\"gpt-5-nano\",\"input\":\"$PROMPT\"}" \
          > output.txt

    # 🔹 Parse Terraform files
    - name: Parse Terraform Output
      run: |
        mkdir -p terraform

        awk '/---main.tf---/{flag=1;next}/---/{flag=0}flag' output.txt > terraform/main.tf
        awk '/---variables.tf---/{flag=1;next}/---/{flag=0}flag' output.txt > terraform/variables.tf
        awk '/---outputs.tf---/{flag=1;next}/---/{flag=0}flag' output.txt > terraform/outputs.tf
        awk '/---terraform.tfvars---/{flag=1;next}/---/{flag=0}flag' output.txt > terraform/terraform.tfvars

    # 🔹 Format Terraform (CRITICAL)
    - name: Terraform Format
      run: terraform fmt -recursive
      working-directory: terraform/

    # 🔹 Check for changes
    - name: Check for changes
      id: diff
      run: |
        git add terraform/
        if git diff --cached --quiet; then
          echo "no_changes=true" >> $GITHUB_OUTPUT
        else
          echo "no_changes=false" >> $GITHUB_OUTPUT
        fi

    # 🔹 Commit only if changed
    - name: Commit Changes
      if: steps.diff.outputs.no_changes == 'false'
      run: |
        git commit -m "AI Generated Terraform"
        git push origin HEAD:${{ github.head_ref }}
