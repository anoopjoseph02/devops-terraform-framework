name: AI Terraform Generator

on:
  push:
    paths:
      - 'input/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - uses: hashicorp/setup-terraform@v2

    - name: Install tools
      run: sudo apt-get install -y jq

    - name: Read JSON Input
      run: |
        INPUT=$(cat input/infra.json)
        echo "INPUT<<EOF" >> $GITHUB_ENV
        echo "$INPUT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Build Prompt
      run: |
        #PROMPT=$(printf "You are a senior DevOps engineer and Terraform expert specializing in Microsoft Azure. Your task is to convert the provided infrastructure definition into production-ready Terraform code. REQUIREMENTS: - Use ONLY Azure (azurerm provider) - Dynamically detect resources from input (DO NOT assume fixed resources) - Generate only the resources present in the input JSON - Use correct azurerm_* resource types - Use variables (no hardcoding) - Follow Terraform best practices - Ensure proper dependencies between resources STRUCTURE: - Use modular design where applicable - Generate: main.tf variables.tf outputs.tf terraform.tfvars RULES: - DO NOT include markdown or formatting - DO NOT include explanations - ONLY return plain Terraform code - Use EXACT separators: ---main.tf--- ---variables.tf--- ---outputs.tf--- ---terraform.tfvars--- INPUT JSON: %s" "$INPUT")
        #PROMPT=$(printf "You are a senior DevOps engineer and Terraform expert specializing in Microsoft Azure. Your task is to convert the provided infrastructure definition into production-ready Terraform code. REQUIREMENTS: - Use ONLY Azure (azurerm provider) - Dynamically detect resources from input (DO NOT assume fixed resources) - Generate only the resources present in the input JSON - Use correct azurerm_* resource types - Use variables (no hardcoding) - Follow Terraform best practices - Ensure proper dependencies between resources STRUCTURE: - Generate: main.tf variables.tf outputs.tf terraform.tfvars CRITICAL RULES: - You MUST ONLY generate resources explicitly present in INPUT JSON - You MUST NOT generate any additional resources, blocks, or attributes - If something is not present in input -> DO NOT generate it - Output MUST be a direct 1:1 mapping of input -> Terraform - If unsure -> OMIT (do not guess) RULES: - ONLY modify required resources - DO NOT overwrite entire file - Preserve existing resource names, structure, and formatting - Avoid duplicate resources - Maintain consistent attribute ordering inside resources - Use stable naming conventions derived ONLY from input - Do not introduce timestamps, hashes, or random suffixes - DO NOT introduce optional attributes unless explicitly required by input - DO NOT add depends_on if implicit dependency already exists - Ensure identical output for identical input STRICT OUTPUT RULES: - DO NOT include markdown or formatting - DO NOT include explanations - ONLY return plain Terraform code - Use EXACT separators with no spaces: ---main.tf--- ---variables.tf--- ---outputs.tf--- ---terraform.tfvars--- OUTPUT FORMAT (STRICT): ---main.tf--- <code> ---variables.tf--- <code> ---outputs.tf--- <code> ---terraform.tfvars--- <code> INPUT JSON: %s" "$INPUT")
        PROMPT=$(printf '%s INPUT JSON: %s' "You are a senior DevOps engineer and Terraform expert specializing in Microsoft Azure. Your task is to convert the provided infrastructure definition into production-ready Terraform code. PROVIDER VERSION: Use ONLY azurerm provider ~> 3.0. Set version constraint inside required_providers block NOT inside the provider block. Do NOT use ~> 4.0 or any v4 attribute names. PROVIDER BLOCK CRITICAL RULE: The azurerm provider block must contain ONLY the features {} block and nothing else. DO NOT add use_cli = true. DO NOT add skip_provider_registration or any other attributes. DO NOT add subscription_id tenant_id client_id or client_secret inside the provider block — these are read automatically from ARM_* environment variables set at the CI/CD job level. The correct provider block is always exactly this and nothing else: provider \"azurerm\" { features {} }. AZURERM v3 ATTRIBUTE NAMES — USE THESE EXACTLY: azurerm_storage_account: allow_nested_items_to_be_public = false (NOT allow_blob_public_access — removed in v3), https_traffic_only_enabled = true (NOT enable_https_traffic_only — deprecated in v3), min_tls_version = TLS1_2. azurerm_kubernetes_cluster REQUIRED ARGUMENTS: dns_prefix is REQUIRED — always set dns_prefix = var.dns_prefix and declare variable dns_prefix in variables.tf and set it in terraform.tfvars. azurerm_kubernetes_cluster default_node_pool: enable_auto_scaling = true/false (NOT auto_scaling_enabled — v4 only), enable_node_public_ip = false (NOT node_public_ip_enabled — v4 only), enable_host_encryption = false (NOT host_encryption_enabled — v4 only), when enable_auto_scaling = true set min_count and max_count and OMIT node_count, when enable_auto_scaling = false set node_count and OMIT min_count and max_count. azurerm_kubernetes_cluster REQUIRED BLOCKS: ALWAYS include an identity block with type = SystemAssigned — this is REQUIRED by the azurerm provider and terraform validate will fail if omitted. The identity block must always be: identity { type = SystemAssigned }. azurerm_key_vault: tenant_id is REQUIRED always include it, always add this data source at the top of main.tf: data azurerm_client_config current {}, set tenant_id = data.azurerm_client_config.current.tenant_id, use sku_name (NOT sku), soft_delete_retention_days minimum value is 7. azurerm_key_vault access_policy permissions CRITICAL RULE: ALL permission values MUST be Title Case. key_permissions valid values are ONLY: [Get List Update Create Import Delete Recover Backup Restore Decrypt Encrypt UnwrapKey WrapKey Verify Sign Purge Release Rotate GetRotationPolicy SetRotationPolicy]. secret_permissions valid values are ONLY: [Get List Set Delete Recover Backup Restore Purge]. certificate_permissions valid values are ONLY: [Get List Update Create Import Delete Recover Backup Restore ManageContacts ManageIssuers GetIssuers ListIssuers SetIssuers DeleteIssuers Purge]. NEVER use lowercase strings like get list set delete. azurerm_container_registry: sku = Basic or Standard or Premium, admin_enabled = false. VARIABLE CONSISTENCY RULE: Every variable referenced in main.tf as var.something MUST have a corresponding variable block declared in variables.tf. Every variable declared in variables.tf MUST also have a corresponding value set in terraform.tfvars. STRICT OUTPUT RULES: DO NOT include markdown or formatting. DO NOT include backticks or code fences like hcl or anywhere in the output. DO NOT include explanations. ONLY return plain Terraform code. The output must be raw HCL that can be written directly to a .tf or .tfvars file. Use EXACT separators with no spaces: ---main.tf--- ---variables.tf--- ---outputs.tf--- ---terraform.tfvars--- OUTPUT FORMAT (STRICT): ---main.tf--- <code> ---variables.tf--- <code> ---outputs.tf--- <code> ---terraform.tfvars--- <code>" "$INPUT")
        echo "PROMPT<<EOF" >> $GITHUB_ENV
        echo "$PROMPT" >> $GITHUB_ENV
        echo "EOF" >> $GITHUB_ENV

    - name: Call OpenAI API
      run: |
        jq -n \
          --arg prompt "$PROMPT" \
          '{
            model: "gpt-4o",
            messages: [
              {role: "system", content: "You are a Terraform expert."},
              {role: "user", content: $prompt}
            ]
          }' > payload.json
        JSON=$(jq -c . payload.json)

        curl -s https://api.openai.com/v1/chat/completions \
          -H "Authorization: Bearer ${{ secrets.OPENAI_API_KEY }}" \
          -H "Content-Type: application/json" \
          -d "$JSON" > response.json

        cat response.json | jq -r '.choices[0].message.content' > terraform_output.txt
        cat terraform_output.txt
        sed -i 's/```hcl//g; s/```//g; s/^###.*//g' terraform_output.txt

    - name: Split Terraform Files
      run: |
        mkdir -p terraform/modules
        awk '/---main.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/main.tf
        awk '/---variables.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/variables.tf
        awk '/---outputs.tf---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/outputs.tf
        awk '/---terraform.tfvars---/{flag=1;next}/---/{flag=0}flag' terraform_output.txt > terraform/terraform.tfvars
        sed -i '/depends_on/d' terraform/main.tf

    - name: Format Terraform
      run: terraform fmt -recursive
      working-directory: terraform/

    - name: Create Branch & PR
      env:
        TOKEN: ${{ secrets.TOKEN }}
        REPO: ${{ github.repository }}
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        BRANCH="ai-terraform-pr"
        git checkout -b $BRANCH

        git add terraform/
        git commit -m "AI Generated Terraform"
        git push origin HEAD:$BRANCH --force
    #     curl -X POST https://api.github.com/repos/$REPO/pulls -H "Authorization: Bearer $TOKEN" -H "Accept: application/vnd.github.v3+json" -d "{\"title\":\"AI Terraform\",\"head\":\"$BRANCH\",\"base\":\"master\",\"body\":\"Auto-generated Terraform code\"}"
        
