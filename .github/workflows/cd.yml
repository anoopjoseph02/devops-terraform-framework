name: Terraform CD

on:
  workflow_run:
    workflows: ["Terraform CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        repository: ${{ github.event.workflow_run.head_repository.full_name }}
        ref: ${{ github.event.workflow_run.head_branch }}

    - uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init
      working-directory: terraform/

    - name: Apply (with retry)
      run: |
        terraform apply -auto-approve || bash scripts/self_heal.sh

    - name: Capture deployment metrics
      if: always()
      run: bash scripts/capture_metrics.sh
      env:
        GH_TOKEN: ${{ secrets.TOKEN }}
        DEPLOY_DURATION_SECONDS: ${{ steps.apply.outputs.duration || 0 }}
        JOB_STATUS: ${{ job.status }}

    - name: Run anomaly detection
      if: success()
      run: |
        pip install scikit-learn numpy --break-system-packages
        python scripts/anomaly_detector.py
