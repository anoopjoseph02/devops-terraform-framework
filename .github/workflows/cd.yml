name: Terraform CD

on:
  workflow_run:
    workflows: ["Terraform CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
          ref: ai-terraform-pr
          # Fetch full history so git push back works cleanly
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

    - uses: hashicorp/setup-terraform@v2

    - name: Terraform Init
      run: terraform init
      working-directory: terraform/

    - name: Apply (with retry)
      run: |
        ls -la terraform/
        terraform apply -auto-approve || bash scripts/self_heal.sh

    - name: Capture deployment metrics
      if: always()
      run: bash scripts/capture_metrics.sh
      env:
        GH_TOKEN: ${{ secrets.TOKEN }}
        DEPLOY_DURATION_SECONDS: ${{ steps.apply.outputs.duration || 0 }}
        JOB_STATUS: ${{ job.status }}

    - name: Run anomaly detection
      if: success()
      run: |
        pip install scikit-learn numpy --break-system-packages
        python scripts/anomaly_detector.py
